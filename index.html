<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>JoyFit 아자부주반</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
  <header id="app-header">
    <h1>JoyFit 아자부주반</h1>
    <div id="sync-status" class="sync-status"></div>
    <div id="user-toggle">
      <button class="user-btn active" data-user="husband" onclick="switchUser('husband')">🧔 남편</button>
      <button class="user-btn" data-user="wife" onclick="switchUser('wife')">👩 아내</button>
    </div>
  </header>

  <main id="main-content">
    <!-- 탭1: 오늘의 운동 -->
    <section id="tab-today" class="tab-content active">
      <div class="date-bar">
        <label for="log-date">날짜:</label>
        <input type="date" id="log-date">
      </div>
      <div id="progress-bar-wrap">
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-text" class="progress-text"></span>
      </div>
      <div id="program-list"></div>
    </section>

    <!-- 탭2: 기록 보기 -->
    <section id="tab-history" class="tab-content">
      <div class="history-filters">
        <div class="filter-row">
          <input type="date" id="history-start">
          <span>~</span>
          <input type="date" id="history-end">
        </div>
        <div class="filter-row">
          <label class="toggle-label">
            <input type="checkbox" id="history-show-both" checked> 두 사람 모두 보기
          </label>
        </div>
      </div>
      <div id="history-list"></div>
    </section>

    <!-- 탭3: 운동 설명 -->
    <section id="tab-guide" class="tab-content">
      <h2 class="section-title">🏃 유산소 머신</h2>
      <div id="guide-cardio"></div>
      <h2 class="section-title">💪 근력 머신</h2>
      <div id="guide-strength"></div>
    </section>
  </main>

  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="today" onclick="switchTab('today')">
      <span class="tab-icon">✅</span>
      <span class="tab-label">오늘의 운동</span>
    </button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
      <span class="tab-icon">📊</span>
      <span class="tab-label">기록 보기</span>
    </button>
    <button class="tab-btn" data-tab="guide" onclick="switchTab('guide')">
      <span class="tab-icon">📖</span>
      <span class="tab-label">운동 설명</span>
    </button>
  </nav>

  <!-- 동영상 모달 -->
  <div id="video-modal" class="modal-overlay" onclick="if(event.target===this)closeVideo()">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="video-title"></h2>
        <button class="modal-close" onclick="closeVideo()">&times;</button>
      </div>
      <p id="video-subtitle" class="modal-subtitle"></p>
      <div id="video-player" class="modal-video"></div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
