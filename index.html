<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>JoyFit 아자부주반</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#4A90D9">
</head>
<body>
  <header id="app-header">
    <h1>JoyFit 아자부주반</h1>
    <div id="sync-status" class="sync-status"></div>
    <div id="user-toggle">
      <button class="user-btn active" data-user="husband" onclick="switchUser('husband')">🧔 정환</button>
      <button class="user-btn" data-user="wife" onclick="switchUser('wife')">👩 고은</button>
    </div>
  </header>

  <main id="main-content">
    <!-- 탭1: 오늘의 운동 -->
    <section id="tab-today" class="tab-content active">
      <div class="date-bar">
        <label for="log-date">날짜:</label>
        <input type="date" id="log-date">
      </div>
      <div class="program-selector">
        <select id="program-select" onchange="onProgramSelect()"></select>
      </div>
      <div id="progress-bar-wrap">
        <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        <span id="progress-text" class="progress-text"></span>
      </div>
      <div id="program-list"></div>
    </section>

    <!-- 탭2: 기록 보기 -->
    <section id="tab-history" class="tab-content">
      <div class="history-filters">
        <div class="filter-row">
          <input type="date" id="history-start">
          <span>~</span>
          <input type="date" id="history-end">
        </div>
        <div class="filter-row">
          <label class="toggle-label">
            <input type="checkbox" id="history-show-both" checked> 두 사람 모두 보기
          </label>
        </div>
      </div>
      <div id="history-list"></div>
    </section>

    <!-- 탭3: 프로그램 관리 -->
    <section id="tab-programs" class="tab-content">
      <div id="program-manager">
        <div class="pm-header">
          <h2 class="section-title">내 프로그램</h2>
          <button class="btn-new-program" onclick="createNewProgram()">+ 새 프로그램</button>
        </div>
        <div id="program-cards"></div>

        <h2 class="section-title" style="margin-top:24px">📖 운동 설명</h2>
        <div id="guide-list"></div>
      </div>

      <!-- 프로그램 편집 화면 -->
      <div id="program-editor" style="display:none">
        <div class="editor-header">
          <button class="btn-back" onclick="closeEditor()">← 돌아가기</button>
          <button class="btn-delete-program" id="btn-delete-prog" onclick="deleteProgram()">삭제</button>
        </div>
        <div class="editor-field">
          <label>프로그램 이름</label>
          <input type="text" id="edit-prog-name" placeholder="예: 전신 운동">
        </div>
        <div id="edit-steps"></div>
        <button class="btn-add-step" onclick="addEditorStep()">+ 운동 추가</button>
        <button class="btn-save-program" onclick="saveProgram()">저장</button>
      </div>
    </section>
  </main>

  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="today" onclick="switchTab('today')">
      <span class="tab-icon">✅</span>
      <span class="tab-label">오늘의 운동</span>
    </button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
      <span class="tab-icon">📊</span>
      <span class="tab-label">기록 보기</span>
    </button>
    <button class="tab-btn" data-tab="programs" onclick="switchTab('programs')">
      <span class="tab-icon">📋</span>
      <span class="tab-label">프로그램</span>
    </button>
  </nav>

  <!-- 동영상 모달 -->
  <div id="video-modal" class="modal-overlay" onclick="if(event.target===this)closeVideo()">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="video-title"></h2>
        <button class="modal-close" onclick="closeVideo()">&times;</button>
      </div>
      <p id="video-subtitle" class="modal-subtitle"></p>
      <div id="video-player" class="modal-video"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
