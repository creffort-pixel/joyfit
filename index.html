<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>JoyFit 아자부주반</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
</head>
<body>
  <!-- 헤더 -->
  <header id="app-header">
    <h1>JoyFit 아자부주반</h1>
    <div id="user-toggle">
      <button class="user-btn active" data-user="husband" onclick="switchUser('husband')">🧔 남편</button>
      <button class="user-btn" data-user="wife" onclick="switchUser('wife')">👩 아내</button>
    </div>
  </header>

  <!-- 탭 컨텐츠 영역 -->
  <main id="main-content">
    <!-- 탭1: 운동기구 -->
    <section id="tab-equipment" class="tab-content active">
      <h2 class="section-title">🏃 유산소 머신</h2>
      <div id="cardio-list" class="equipment-grid"></div>
      <h2 class="section-title">💪 근력 머신</h2>
      <div id="strength-list" class="equipment-grid"></div>
    </section>

    <!-- 탭2: 오늘의 기록 -->
    <section id="tab-today" class="tab-content">
      <div class="date-bar">
        <label for="log-date">날짜:</label>
        <input type="date" id="log-date">
      </div>
      <div id="today-summary"></div>
      <button class="btn-add-exercise" onclick="showEquipmentPicker()">+ 운동 추가</button>
    </section>

    <!-- 탭3: 기록 보기 -->
    <section id="tab-history" class="tab-content">
      <div class="history-filters">
        <div class="filter-row">
          <input type="date" id="history-start" placeholder="시작일">
          <span>~</span>
          <input type="date" id="history-end" placeholder="종료일">
        </div>
        <select id="history-equipment-filter">
          <option value="all">전체 기구</option>
        </select>
        <div class="filter-row">
          <label class="toggle-label">
            <input type="checkbox" id="history-show-both"> 두 사람 모두 보기
          </label>
        </div>
      </div>
      <div id="history-list"></div>
      <div class="export-import-bar">
        <button class="btn-export" onclick="exportData()">📤 내보내기</button>
        <button class="btn-import" onclick="document.getElementById('import-file').click()">📥 가져오기</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </section>
  </main>

  <!-- 하단 탭 바 -->
  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="equipment" onclick="switchTab('equipment')">
      <span class="tab-icon">🏋️</span>
      <span class="tab-label">운동기구</span>
    </button>
    <button class="tab-btn" data-tab="today" onclick="switchTab('today')">
      <span class="tab-icon">📝</span>
      <span class="tab-label">오늘의 기록</span>
    </button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
      <span class="tab-icon">📊</span>
      <span class="tab-label">기록 보기</span>
    </button>
  </nav>

  <!-- 장비 상세 모달 -->
  <div id="equipment-modal" class="modal-overlay" onclick="closeModalOverlay(event)">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <p id="modal-subtitle" class="modal-subtitle"></p>
      <div id="modal-video" class="modal-video"></div>
      <div class="modal-log-section">
        <h3>운동 기록하기</h3>
        <div class="date-bar">
          <label for="modal-date">날짜:</label>
          <input type="date" id="modal-date">
        </div>
        <div id="modal-sets"></div>
        <button class="btn-add-set" onclick="addSetRow()">+ 세트 추가</button>
        <button class="btn-save" onclick="saveSets()">저장</button>
      </div>
    </div>
  </div>

  <!-- 장비 선택 모달 -->
  <div id="picker-modal" class="modal-overlay" onclick="closePickerOverlay(event)">
    <div class="modal-content picker-content">
      <div class="modal-header">
        <h2>운동 선택</h2>
        <button class="modal-close" onclick="closePicker()">&times;</button>
      </div>
      <div id="picker-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
